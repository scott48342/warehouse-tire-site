# Fitment Change Guard
# Fails build if fitment files change without approval marker
# See docs/FITMENT_CHANGE_CONTROL.md

name: Fitment Change Guard

on:
  pull_request:
    paths:
      # Core fitment logic
      - 'src/lib/fitment/**'
      - 'src/lib/fitment-db/**'
      # Fitment APIs
      - 'src/app/api/vehicles/**'
      - 'src/app/api/wheels/fitment-search/**'
      - 'src/app/api/tires/search/**'
      # Scripts
      - 'scripts/*fitment*'
      - 'scripts/*usaf*'
      - 'scripts/*wheelpros*'
      - 'scripts/*staggered*'
      - 'scripts/*audit*'
      - 'scripts/*merge*'
      - 'scripts/*import*'
      # Schema
      - 'src/db/schema*'
      - 'drizzle/**'
      - 'prisma/schema.prisma'
  push:
    branches: [main]
    paths:
      - 'src/lib/fitment/**'
      - 'src/lib/fitment-db/**'
      - 'src/app/api/vehicles/**'
      - 'src/app/api/wheels/fitment-search/**'
      - 'src/app/api/tires/search/**'

jobs:
  fitment-approval-check:
    name: Check Fitment Change Approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for approval marker
        id: approval
        run: |
          # Check commit message for approval marker
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if echo "$COMMIT_MSG" | grep -q "APPROVED_FITMENT_CHANGE=true"; then
            echo "✅ Fitment change approved via commit message"
            echo "approved=true" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.pull_request.body }}" | grep -q "APPROVED_FITMENT_CHANGE=true"; then
            echo "✅ Fitment change approved via PR description"
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "❌ FITMENT CHANGE DETECTED WITHOUT APPROVAL"
            echo ""
            echo "Files changed in protected fitment paths require explicit approval."
            echo ""
            echo "To approve this change, add to your commit message or PR description:"
            echo "  APPROVED_FITMENT_CHANGE=true"
            echo "  Approved by: [your name]"
            echo "  Reason: [brief explanation]"
            echo ""
            echo "See docs/FITMENT_CHANGE_CONTROL.md for full policy."
            echo "approved=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  fitment-health-check:
    name: Fitment Health Check
    runs-on: ubuntu-latest
    needs: fitment-approval-check
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run canonical source check
        run: npm run fitment:canonical-check || echo "::warning::Canonical check script not found"

      - name: Run deprecated usage check
        run: npm run fitment:deprecated-check || echo "::warning::Deprecated check script not found"

      - name: Build project
        run: npm run build

      - name: Run fitment tests
        run: npm run test -- --testPathPattern="fitment|makeNormalization" --passWithNoTests

  fitment-smoke-test:
    name: Fitment Smoke Test
    runs-on: ubuntu-latest
    needs: fitment-health-check
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel deployment
        run: sleep 120

      - name: Run production smoke test
        env:
          SMOKE_TEST_URL: https://shop.warehousetiredirect.com
        run: |
          node scripts/production-smoke-test.mjs || {
            echo "::error::Production smoke test failed!"
            exit 1
          }
